    <script>
      (function(){var t;try{t=localStorage.getItem("hypatia-theme-mode")}catch{}if(t==="dark"||t==="light"){document.documentElement.setAttribute("data-theme",t)}else if(window.matchMedia("(prefers-color-scheme: dark)").matches){document.documentElement.setAttribute("data-theme","dark")}else{document.documentElement.setAttribute("data-theme","light")}})();
    </script>
